<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>演習：タスクボード - Lesson 30</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <main class="container">
        <header class="header">
            <h1 class="title">簡易タスクボード</h1>
            <p class="subtitle">入力 → 追加 → 一覧更新（DOM操作）で作ります。</p>
        </header>

        <section class="card">
            <h2 class="card-title">タスク追加</h2>

            <form id="taskForm" class="form">
                <label class="label" for="taskInput">タスク名（必須）</label>
                <input id="taskInput" class="input" type="text" placeholder="例：洗濯をする" />
                <p id="taskError" class="error hidden">タスク名を入力してください（1〜30文字）</p>

                <div class="actions">
                    <button class="button" type="submit">追加</button>
                    <button id="clearAllBtn" class="button secondary" type="button">全削除</button>
                </div>
            </form>
        </section>

        <section class="card">
            <h2 class="card-title">一覧</h2>

            <div class="stats">
                <span>合計：<strong id="totalCount">0</strong></span>
                <span>未完了：<strong id="openCount">0</strong></span>
            </div>

            <div class="filters">
                <button data-filter="all" class="chip is-active" type="button">すべて</button>
                <button data-filter="open" class="chip" type="button">未完了</button>
                <button data-filter="done" class="chip" type="button">完了</button>
            </div>

            <ul id="taskList" class="list"></ul>
        </section>
    </main>

    <script src="./main.js"></script>
</body>

</html>
