<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>フォームUI - Lesson 28</title>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <main class="container">
        <header class="page-header">
            <h1 class="title">お問い合わせフォーム（UI）</h1>
            <p class="subtitle">
                この回は「見た目」まで作ります。入力チェック（JS）は次回以降で行います。
            </p>
        </header>

        <section class="card">
            <h2 class="card-title">入力</h2>

            <form class="form" action="#" method="post">
                <div class="field">
                    <label class="label" for="name">お名前 <span class="required">必須</span></label>
                    <input class="input" id="name" name="name" type="text" placeholder="例：山田 太郎" required />
                    <p class="hint">フルネームで入力してください。</p>
                </div>

                <div class="field">
                    <label class="label" for="email">メールアドレス <span class="required">必須</span></label>
                    <input class="input" id="email" name="email" type="email" placeholder="example@example.com"
                        required />
                    <p class="hint">半角英数字で入力してください。</p>
                </div>
                <div class="field">
                    <label class="label" for="tell">電話番号<span class="required">必須</span></label>
                    <input class="input" id="tell" name="tell" type="tell" placeholder="000-9999-9999">
                    <p class="hint">半角で入力してください </p>
                </div>
                <div class="field1">

                    <label class="label">連絡方法</label><br>

                    <input type="radio" id="email" name="contact" value="email">
                    <label for="email">メール</label>

                    <input type="radio" id="phone" name="contact" value="phone">
                    <label for="phone">電話</label>

                </div>

                <div class="field">
                    <label class="label" for="category">お問い合わせ種別</label>
                    <select class="select" id="category" name="category">
                        <option value="general">一般</option>
                        <option value="bug">不具合</option>
                        <option value="request">要望</option>
                    </select>
                </div>

                <div class="field">
                    <label class="label" for="message">お問い合わせ内容 <span class="required">必須</span></label>
                    <textarea class="textarea" id="message" name="message" rows="6" placeholder="内容を入力してください"
                        required></textarea>
                    <p class="hint">200文字以内を目安にしてください。</p>
                </div>

                <div class="field">
                    <label class="checkbox">
                        <input class="checkbox-input" type="checkbox" name="agree" required />
                        <span>利用規約に同意します <span class="required">必須</span></span>
                    </label>
                    <p class="hint">同意しないと送信できない想定です。</p>
                </div>

                <div class="actions">
                    <a href="thanks.html"><button class="button" type="submit">送信する</button> </a>
                    <a class="link" href="../27_layout_flex/">前の回へ戻る</a>

                </div>
            </form>
        </section>

        <section class="card">
            <h2 class="card-title">エラー表示（例：静的）</h2>

            <p class="note">
                ここは「入力が間違っているときの見た目」の例です。次回、JSで表示を切り替えます。
            </p>

            <div class="field is-error">
                <label class="label" for="demo">メールアドレス</label>
                <input class="input" id="demo" type="text" value="abc" />
                <p class="error">メールアドレスの形式が正しくありません</p>
                <label class="label" for="demo">お名前</label>
                <input class="input" id="demo" type="text" value="abc" />
                <p class="error">お名前が未入力です</p>
                <label class="label" for="demo">問い合わせ</label>
                <input class="input" id="demo" type="text" value="abc" />
                <p class="error">お問い合わせ内容が短すぎる。</p>
            </div>
        </section>
    </main>
</body>

</html>
