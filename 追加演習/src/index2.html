<html>

<head>
    <title>Sample1</title>
</head>

<body>
    <script>
        var i;
        for (i = 0; i <= 10; i++) {
            document.write(i + "<br>")
        }
        for (i = 10; i >= 0; i--) {
            document.write(i)
        }
        for (i = 0; i <= 10; i++) {
            if (i % 2 !== 0) {
                continue
            } document.write(i)

        } document.write("<br>")
        for (i = 0; i <= 10; i++) {
            if (i % 2 == 0) {
                continue
            } document.write(i)
        }

    </script>
</body>

</html>
